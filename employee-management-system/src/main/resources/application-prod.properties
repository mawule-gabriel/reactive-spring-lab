spring.r2dbc.url=r2dbc:postgresql://${EMS_DB_HOST}:${EMS_DB_PORT}/${EMS_DB_NAME}
spring.r2dbc.username=${EMS_DB_USERNAME}
spring.r2dbc.password=${EMS_DB_PASSWORD}
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.validation-query=SELECT 1

spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://${EMS_DB_HOST}:${EMS_DB_PORT}/${EMS_DB_NAME}
spring.flyway.user=${EMS_DB_USERNAME}
spring.flyway.password=${EMS_DB_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.h2.console.enabled=false

app.jwt.secret=${EMS_JWT_SECRET}
app.jwt.expiry-ms=${EMS_JWT_EXPIRY_MS:3600000}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false

logging.level.org.springframework.r2dbc=WARN
logging.level.org.flywaydb=INFO
logging.level.com.mawule=INFO
