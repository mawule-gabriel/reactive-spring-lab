spring.application.name=employee-management-system
spring.profiles.active=dev

spring.docker.compose.enabled=false

spring.r2dbc.url=r2dbc:h2:mem:///ems_dev?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
spring.r2dbc.username=sa
spring.r2dbc.password=

spring.flyway.enabled=true
spring.flyway.url=jdbc:h2:mem:ems_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
spring.flyway.user=sa
spring.flyway.password=
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${EMS_JWT_SECRET}
app.jwt.expiry-ms=${EMS_JWT_EXPIRY_MS:3600000}

app.admin.email=${EMS_ADMIN_EMAIL:}
app.admin.password=${EMS_ADMIN_PASSWORD:}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.flywaydb=INFO
logging.level.com.mawule=DEBUG
